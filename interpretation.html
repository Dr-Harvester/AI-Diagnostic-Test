<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Diagnostic Test</title>

<link href="interpretationstyle.css" rel="stylesheet">
<link href='https://fonts.googleapis.com/css?family=Changa' rel='stylesheet'>
<link href='https://fonts.googleapis.com/css?family=Bowlby+One+SC' rel='stylesheet'>

</head>
<body>

<div id="background"></div>
<div id="backdrop"></div>
<div id="questionbox"></div>

<div class="image" id="interpretationimage">
  <img src="Images/Interpretation/1.jpg"
       alt="Interpretation Image"
       width="500"
       height="400">
</div>

<div class="answer"
     data-question-id="501"
     data-question-reference="refG"
     data-question-type="interpretation">

  <textarea
    id="textAnswer"
    placeholder="Type your description here..."
    oninput="saveTextAnswer()">
  </textarea>

</div>

<button class="pageLink" id="last" onclick="lastQuestion(questionID)">Last Question</button>
<button class="pageLink" id="next" onclick="nextQuestion(questionID)">Next Question</button>

<script>

function saveTextAnswer() {

  const textarea = document.getElementById("textAnswer");

  if (!textarea) return;

  updateAnswer(
    Number(sessionStorage.getItem("questionID")),
    textarea.value
  );
}

window.pageController = {

  selectAnswer(text) {

    if (!text) return;

    const textarea = document.getElementById("textAnswer");

    if (!textarea) return;

    textarea.value = text;
  }

};

</script>

</body>
</html>
