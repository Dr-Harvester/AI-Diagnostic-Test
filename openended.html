<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Diagnostic Test</title>

<link href="openendeddesktop.css" rel="stylesheet" media="(min-width: 769px)">
<link href="openendedmobile.css" rel="stylesheet" media="(max-width: 768px)">
<link href='https://fonts.googleapis.com/css?family=Changa' rel='stylesheet'>
<link href='https://fonts.googleapis.com/css?family=Bowlby+One+SC' rel='stylesheet'>

</head>
<body>

<div id="background"></div>
<div id="backdrop">
  <div id="questionbox"></div>

  <div class="answer"
      data-question-id="601"
      data-question-reference="refH"
      data-question-type="open-ended">

    <textarea
      id="textAnswer"
      placeholder="Type your answer here..."
      oninput="saveTextAnswer()"></textarea>

  </div>

  <button class="pageLink" id="last" onclick="lastQuestion(questionID)">Last Question</button>
  <button class="pageLink" id="next" onclick="nextQuestion(questionID)">Next Question</button>
</div>


<script>

function saveTextAnswer() {

  const textarea = document.getElementById("textAnswer");

  if (!textarea) return;

  updateAnswer(
    Number(sessionStorage.getItem("questionID")),
    textarea.value
  );
}

window.pageController = {

  selectAnswer(text) {

    if (!text) return;

    const textarea = document.getElementById("textAnswer");

    if (!textarea) return;

    textarea.value = text;
  }

};

</script>

</body>
</html>
