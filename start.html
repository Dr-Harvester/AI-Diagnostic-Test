<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>AI Diagnostic Test</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="startdesktop.css" rel="stylesheet" media="(min-width: 769px)">
  <link href="startmobile.css" rel="stylesheet" media="(max-width: 768px)">
  <link href='https://fonts.googleapis.com/css?family=Angkor' rel='stylesheet'>
  <link href='https://fonts.googleapis.com/css?family=Electrolize' rel='stylesheet'>
  <link href='https://fonts.googleapis.com/css?family=Bowlby+One+SC' rel='stylesheet'>
</head>

<body>
  <div id="mainContent">
    <div id="background"></div>
      <div id="backdrop">
        <h1 id="title">AI Diagnostic Test</h1>
        <button class="pageLink" id="start">Start</button>
      </div>
    </div>

  <div id="loadingContainer">
        <div id="loadingbackground"></div>
        <div class="spinner"></div>
        <p>Loading...</p>
      </div>

  <script src="script.js"></script>
  <script>
    document.getElementById('start').addEventListener('click', function () {
      document.getElementById('loadingContainer').style.display = 'flex';
      document.getElementById('mainContent').style.display = 'none';
      const [numberList, IDList, typeList] = randomize(1, 400);
      setTimeout(() => {
        if (typeList[1] === 1) {
          loadPage("multiple.html", 1);
        } else if (typeList[1] === 2) {
          loadPage("select.html", 1);
        } else if (typeList[1] === 3) {
          loadPage("onetofive.html", 1);
        } else if (typeList[1] === 4) {
          loadPage("yesno.html", 1);
        } else if (typeList[1] === 5) {
          loadPage("image.html", 1);
        } else if (typeList[1] === 6) {
          loadPage("interpretation.html", 1);
        } else if (typeList[1] === 7) {
          loadPage("openended.html", 1);
        } else if (typeList[1] === 8) {
          loadPage("rank.html", 1);
        } else {
          alert("Error.");
        }
      }, 5000);
    });
</script>
</body>
</html>
